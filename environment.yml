name: llms-course
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - spyder
  - spyder-kernels
  - ipykernel

  # Core data science
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - scipy
  - openpyxl

  # Local LLM / NLP
  - pip
  - pip:
      - ollama
      - langchain
      - langchain-community
      - langchain-ollama
      - chromadb
      - sentence-transformers
      - transformers
      - spacy
      - https://github.com/explosion/spacy-models/releases/download/da_core_news_sm-3.8.0/da_core_news_sm-3.8.0-py3-none-any.whl
      - tiktoken
